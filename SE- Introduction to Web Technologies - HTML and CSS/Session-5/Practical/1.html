<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Card</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f1f3f6; padding: 30px;">

    <div style="width: 320px; background: white; border: 1px solid #ddd; border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">

        <img src="https://via.placeholder.com/280x220.png?text=Smartphone"
             alt="Smartphone"
             style="width:100%; border-radius:8px;">

        <!-- Inline CSS applied only to the product title -->
        <h2 style="background-color:#ffe082; font-size:28px; padding:10px; border-radius:6px; color:#222;">
            Samsung Galaxy S25 5G
        </h2>

        <p><strong>Price:</strong> ₹74,999</p>

        <p>
            Experience a stunning AMOLED display, powerful processor,
            advanced camera system, and long-lasting battery.
        </p>

        <button style="background:#2874f0; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">
            Buy Now
        </button>

    </div>

</body>
</html>
