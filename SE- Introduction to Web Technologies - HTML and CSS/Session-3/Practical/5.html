<!-- 
The Order ID is generated by the system and should not be editable by users.
Using the disabled attribute prevents users from modifying this fixed value.
-->

<div class="form-group">
    <label for="orderId">Order ID</label>
    <input
        type="text"
        id="orderId"
        name="orderId"
        value="ORD12345"
        disabled>
</div>
