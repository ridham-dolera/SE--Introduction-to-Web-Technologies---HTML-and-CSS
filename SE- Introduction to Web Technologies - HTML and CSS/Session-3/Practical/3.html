<h2>Flipkart Product Review Form</h2>

<!-- Make sure your form tag looks like this -->
<form action="https://httpbin.org/post" method="POST">
  <!-- Your review inputs (e.g., name, rating, comment) go here -->
  <label for="reviewerName">Name:</label>
  <input type="text" id="reviewerName" name="username">

  <label for="reviewText">Review:</label>
  <textarea id="reviewText" name="review_content"></textarea>

  <button type="submit">Submit Review</button>
</form>
