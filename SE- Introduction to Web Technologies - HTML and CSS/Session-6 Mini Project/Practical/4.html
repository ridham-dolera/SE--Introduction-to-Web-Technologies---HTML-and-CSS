<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Social Link Preview</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3f5fa;
padding:40px 20px;
}

.container{
max-width:900px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

form{
background:#fff;
padding:30px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.input-group{
position:relative;
margin-bottom:18px;
}

.input-group i{
position:absolute;
left:18px;
top:50%;
transform:translateY(-50%);
font-size:20px;
}

.input-group input{
width:100%;
height:55px;
padding-left:55px;
border:1px solid #ddd;
border-radius:12px;
outline:none;
font-size:15px;
transition:.3s;
}

.input-group input:focus{
border-color:#4f46e5;
box-shadow:0 0 0 4px rgba(79,70,229,.12);
}

.instagram i{color:#E4405F;}
.linkedin i{color:#0A66C2;}
.github i{color:#181717;}
.youtube i{color:#FF0000;}

button{
width:100%;
height:55px;
border:none;
border-radius:12px;
background:#4f46e5;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#3f35d6;
}

.preview{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:35px;
}

.card{
border-radius:16px;
padding:22px;
color:white;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card i{
font-size:40px;
margin-bottom:15px;
}

.card h3{
margin-bottom:8px;
}

.card p{
margin-bottom:18px;
word-break:break-all;
}

.visit{
display:inline-block;
padding:10px 18px;
border-radius:8px;
background:white;
text-decoration:none;
font-weight:600;
color:#333;
}

.instagram-card{
background:linear-gradient(135deg,#fd5949,#d6249f,#285AEB);
}

.linkedin-card{
background:#0A66C2;
}

.github-card{
background:#24292e;
}

.youtube-card{
background:#FF0000;
}

</style>

</head>
<body>

<div class="container">

<h2>Social Link Manager</h2>

<form id="socialForm">

<div class="input-group instagram">
<i class="fab fa-instagram"></i>
<input type="url" id="instagram" placeholder="Instagram URL">
</div>

<div class="input-group linkedin">
<i class="fab fa-linkedin"></i>
<input type="url" id="linkedin" placeholder="LinkedIn URL">
</div>

<div class="input-group github">
<i class="fab fa-github"></i>
<input type="url" id="github" placeholder="GitHub URL">
</div>

<div class="input-group youtube">
<i class="fab fa-youtube"></i>
<input type="url" id="youtube" placeholder="YouTube URL">
</div>

<button type="submit">Generate Preview</button>

</form>

<div id="preview" class="preview"></div>

</div>

<script>

const preview=document.getElementById("preview");

document.getElementById("socialForm").addEventListener("submit",function(e){

e.preventDefault();

preview.innerHTML="";

const platforms=[

{
id:"instagram",
name:"Instagram",
icon:"fab fa-instagram",
card:"instagram-card"
},

{
id:"linkedin",
name:"LinkedIn",
icon:"fab fa-linkedin",
card:"linkedin-card"
},

{
id:"github",
name:"GitHub",
icon:"fab fa-github",
card:"github-card"
},

{
id:"youtube",
name:"YouTube",
icon:"fab fa-youtube",
card:"youtube-card"
}

];

platforms.forEach(platform=>{

const url=document.getElementById(platform.id).value.trim();

if(url){

const username=extractUsername(url);

const card=document.createElement("div");

card.className=`card ${platform.card}`;

card.innerHTML=`

<i class="${platform.icon}"></i>

<h3>${platform.name}</h3>

<p><strong>@${username}</strong></p>

<a href="${url}" target="_blank" class="visit">
Visit
</a>

`;

preview.appendChild(card);

}

});

});

function extractUsername(url){

try{

const pathname=new URL(url).pathname;

const parts=pathname.split("/").filter(Boolean);

return parts.pop() || "Unknown";

}

catch{

return "Unknown";

}

}

</script>

</body>
</html>
