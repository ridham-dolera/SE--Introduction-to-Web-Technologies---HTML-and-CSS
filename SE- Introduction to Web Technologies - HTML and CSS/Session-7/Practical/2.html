<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Playlist Bar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#121212;
    color:#fff;
    padding:40px;
}

h1{
    text-align:center;
    color:#1DB954;
    margin-bottom:30px;
}

/* Playlist Bar */
.playlist{
    display:flex;
    justify-content:space-between;
    gap:20px;
    overflow-x:auto;
}

/* Song Card */
.song-card{
    display:flex;
    align-items:center;      /* Vertically centers the text */
    background:#1e1e1e;
    border-radius:10px;
    min-width:220px;
    padding:15px;
    transition:0.3s;
    cursor:pointer;
}

.song-card:hover{
    background:#2c2c2c;
    transform:translateY(-5px);
}

/* Album Image */
.song-card img{
    width:60px;
    height:60px;
    border-radius:8px;
    margin-right:15px;
}

/* Song Details */
.song-info h3{
    font-size:18px;
    margin-bottom:6px;
}

.song-info p{
    color:#b3b3b3;
    font-size:14px;
}
</style>

</head>
<body>

<h1>🎵 Spotify Playlist</h1>

<div class="playlist">

    <div class="song-card">
        <img src="https://via.placeholder.com/60?text=1" alt="Album 1">
        <div class="song-info">
            <h3>Blinding Lights</h3>
            <p>The Weeknd</p>
        </div>
    </div>

    <div class="song-card">
        <img src="https://via.placeholder.com/60?text=2" alt="Album 2">
        <div class="song-info">
            <h3>Believer</h3>
            <p>Imagine Dragons</p>
        </div>
    </div>

    <div class="song-card">
        <img src="https://via.placeholder.com/60?text=3" alt="Album 3">
        <div class="song-info">
            <h3>Perfect</h3>
            <p>Ed Sheeran</p>
        </div>
    </div>

    <div class="song-card">
        <img src="https://via.placeholder.com/60?text=4" alt="Album 4">
        <div class="song-info">
            <h3>Levitating</h3>
            <p>Dua Lipa</p>
        </div>
    </div>

    <div class="song-card">
        <img src="https://via.placeholder.com/60?text=5" alt="Album 5">
        <div class="song-info">
            <h3>Shape of You</h3>
            <p>Ed Sheeran</p>
        </div>
    </div>

</div>

</body>
</html>
