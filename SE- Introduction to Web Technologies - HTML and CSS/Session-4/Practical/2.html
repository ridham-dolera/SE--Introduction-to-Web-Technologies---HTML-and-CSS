<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zomato Restaurant Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f8f8f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:400px;
}

article{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition:.3s;
}

article:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 28px rgba(0,0,0,.2);
}

article img{
    width:100%;
    height:220px;
    object-fit:cover;
}

header{
    padding:18px 20px 10px;
}

header h2{
    color:#222;
    margin-bottom:5px;
}

.category{
    color:#777;
    font-size:14px;
}

.description{
    padding:0 20px 18px;
    color:#555;
    line-height:1.6;
}

footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    border-top:1px solid #eee;
    background:#fafafa;
}

.rating{
    background:#267E3E;
    color:white;
    padding:6px 12px;
    border-radius:8px;
    font-weight:bold;
}

.delivery{
    color:#555;
    font-weight:bold;
}

@media(max-width:500px){
    header h2{
        font-size:22px;
    }

    footer{
        flex-direction:column;
        gap:10px;
    }
}
</style>

</head>
<body>

<div class="container">

    <article>

        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800"
             alt="Pizza Restaurant">

        <header>
            <h2>La Pino'z Pizza</h2>
            <p class="category">Pizza • Fast Food • Italian</p>
        </header>

        <section class="description">
            Enjoy freshly baked pizzas, cheesy garlic bread,
            pasta, and delicious desserts delivered hot and fresh.
        </section>

        <footer>
            <span class="rating">⭐ 4.5</span>
            <span class="delivery">🚴 30 mins</span>
        </footer>

    </article>

</div>

</body>
</html>
