<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive BookMyShow Movie Details</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .movie-card{
            background:#fff;
            border-radius:15px;
            padding:25px;
            margin-top:40px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
        }

        .movie-poster{
            width:100%;
            border-radius:12px;
            box-shadow:0 4px 10px rgba(0,0,0,0.2);
        }

        .rating{
            display:inline-block;
            background:#28a745;
            color:#fff;
            padding:6px 12px;
            border-radius:6px;
            margin:12px 0;
            font-weight:bold;
        }

        .book-btn{
            background:#f84464;
            color:#fff;
            border:none;
            padding:12px 25px;
        }

        .book-btn:hover{
            background:#d62d4d;
            color:#fff;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="row movie-card align-items-center">

        <!-- Poster -->
        <div class="col-12 col-md-6 mb-4 mb-md-0 text-center">
            <img src="https://via.placeholder.com/350x500?text=Movie+Poster"
                 alt="Movie Poster"
                 class="movie-poster">
        </div>

        <!-- Movie Details -->
        <div class="col-12 col-md-6">

            <h2 class="fw-bold">Avengers: Endgame</h2>

            <p class="text-muted">
                <strong>Genre:</strong> Action, Adventure, Sci-Fi
            </p>

            <span class="rating">⭐ 4.8 / 5</span>

            <p class="mt-3">
                After the devastating events of Infinity War, the Avengers
                reunite to restore balance and save the universe in one of
                Marvel's biggest blockbuster movies.
            </p>

            <ul class="list-group mb-4">
                <li class="list-group-item"><strong>Duration:</strong> 3h 1m</li>
                <li class="list-group-item"><strong>Language:</strong> English</li>
                <li class="list-group-item"><strong>Release:</strong> 26 April 2019</li>
            </ul>

            <button class="btn book-btn">
                🎟️ Book Now
            </button>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
