<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Cards</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f1f3f6;
        }

        .product-card{
            transition:0.3s;
        }

        .product-card:hover{
            transform:translateY(-5px);
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .price{
            color:#388e3c;
            font-size:1.2rem;
            font-weight:bold;
        }

        .btn-buy{
            background:#2874f0;
            color:#fff;
        }

        .btn-buy:hover{
            background:#0d6efd;
            color:#fff;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="text-center text-primary mb-4">
        🛒 Flipkart Product Cards
    </h2>

    <div class="row g-4">

        <!-- Product 1 -->
        <div class="col-md-4">
            <div class="card product-card h-100">
                <img src="https://via.placeholder.com/300x220?text=Headphones"
                     class="card-img-top"
                     alt="Wireless Headphones">

                <div class="card-body text-center">
                    <h5 class="card-title">Wireless Headphones</h5>
                    <p class="price">₹2,499</p>
                    <p class="card-text">
                        Premium sound quality with Bluetooth 5.3 connectivity.
                    </p>
                    <button class="btn btn-buy">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 2 -->
        <div class="col-md-4">
            <div class="card product-card h-100">
                <img src="https://via.placeholder.com/300x220?text=Smart+Watch"
                     class="card-img-top"
                     alt="Smart Watch">

                <div class="card-body text-center">
                    <h5 class="card-title">Smart Watch</h5>
                    <p class="price">₹4,999</p>
                    <p class="card-text">
                        Fitness tracking, heart-rate monitor, and AMOLED display.
                    </p>
                    <button class="btn btn-buy">Buy Now</button>
                </div>
            </div>
        </div>

        <!-- Product 3 -->
        <div class="col-md-4">
            <div class="card product-card h-100">
                <img src="https://via.placeholder.com/300x220?text=Bluetooth+Speaker"
                     class="card-img-top"
                     alt="Bluetooth Speaker">

                <div class="card-body text-center">
                    <h5 class="card-title">Bluetooth Speaker</h5>
                    <p class="price">₹1,999</p>
                    <p class="card-text">
                        Portable speaker with deep bass and long battery life.
                    </p>
                    <button class="btn btn-buy">Buy Now</button>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
