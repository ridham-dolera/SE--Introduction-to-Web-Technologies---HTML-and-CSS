<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Artist Landing Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(135deg,#121212,#1DB954);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .artist-card{
            background:#fff;
            width:100%;
            max-width:420px;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            text-align:center;
            transition:.3s;
        }

        .artist-card:hover{
            transform:translateY(-8px);
        }

        .artist-img{
            width:180px;
            height:180px;
            object-fit:cover;
            border-radius:50%;
            margin-top:30px;
            border:6px solid #1DB954;
        }

        .artist-name{
            margin-top:20px;
            font-size:32px;
            font-weight:bold;
            color:#222;
        }

        .artist-role{
            color:#1DB954;
            font-size:18px;
            margin-bottom:15px;
        }

        .artist-bio{
            color:#666;
            padding:0 30px;
            line-height:1.7;
            margin-bottom:30px;
        }

        .social-buttons{
            padding:25px;
            background:#f8f9fa;
        }

        .social-buttons .btn{
            margin:8px;
            width:55px;
            height:55px;
            border-radius:50%;
            font-size:22px;
            display:inline-flex;
            justify-content:center;
            align-items:center;
        }
    </style>
</head>
<body>

<div class="artist-card">

    <img src="https://via.placeholder.com/180x180.png?text=Artist"
         alt="Artist Profile"
         class="artist-img">

    <h1 class="artist-name">Aarav Beats</h1>

    <p class="artist-role">
        Singer • Songwriter • Music Producer
    </p>

    <p class="artist-bio">
        Creating soulful melodies and energetic beats that inspire millions.
        Follow my musical journey and stay updated with my latest releases,
        concerts, and exclusive behind-the-scenes content.
    </p>

    <div class="social-buttons">

        <a href="#" class="btn btn-danger">
            <i class="bi bi-youtube"></i>
        </a>

        <a href="#" class="btn btn-success">
            <i class="bi bi-spotify"></i>
        </a>

        <a href="#" class="btn btn-dark">
            <i class="bi bi-instagram"></i>
        </a>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
