<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Featured Playlists</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#121212;
            color:white;
        }

        .playlist-card{
            background:#181818;
            border:none;
            border-radius:15px;
            transition:0.3s;
            overflow:hidden;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

        .playlist-card:hover{
            transform:translateY(-8px);
            box-shadow:0 10px 25px rgba(0,0,0,0.5);
        }

        .playlist-card img{
            height:250px;
            object-fit:cover;
        }

        .playlist-title{
            color:#1DB954;
            font-weight:bold;
        }

        .btn-listen{
            background:#1DB954;
            color:white;
            border:none;
        }

        .btn-listen:hover{
            background:#18a74a;
            color:white;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-5">
        🎵 Featured Playlists
    </h2>

    <div class="row g-4">

        <!-- Playlist 1 -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card playlist-card h-100">
                <img src="https://via.placeholder.com/400x250?text=Top+Hits"
                     class="card-img-top"
                     alt="Top Hits">

                <div class="card-body text-center">
                    <h4 class="playlist-title">Top Hits 2026</h4>
                    <p class="text-light">
                        Trending songs from around the world.
                    </p>

                    <button class="btn btn-listen">
                        <i class="bi bi-play-fill"></i> Listen Now
                    </button>
                </div>
            </div>
        </div>

        <!-- Playlist 2 -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card playlist-card h-100">
                <img src="https://via.placeholder.com/400x250?text=Chill+Vibes"
                     class="card-img-top"
                     alt="Chill Vibes">

                <div class="card-body text-center">
                    <h4 class="playlist-title">Chill Vibes</h4>
                    <p class="text-light">
                        Relaxing music for work and study.
                    </p>

                    <button class="btn btn-listen">
                        <i class="bi bi-play-fill"></i> Listen Now
                    </button>
                </div>
            </div>
        </div>

        <!-- Playlist 3 -->
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card playlist-card h-100">
                <img src="https://via.placeholder.com/400x250?text=Workout+Mix"
                     class="card-img-top"
                     alt="Workout Mix">

                <div class="card-body text-center">
                    <h4 class="playlist-title">Workout Mix</h4>
                    <p class="text-light">
                        High-energy tracks to keep you motivated.
                    </p>

                    <button class="btn btn-listen">
                        <i class="bi bi-play-fill"></i> Listen Now
                    </button>
                </div>
            </div>
        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
