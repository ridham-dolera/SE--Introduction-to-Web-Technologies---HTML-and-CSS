<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#121212;
            color:white;
        }

        .navbar{
            background:#000;
        }

        .navbar-brand{
            color:#1DB954 !important;
            font-size:1.5rem;
            font-weight:bold;
        }

        .nav-link{
            color:white !important;
            transition:0.3s;
        }

        .nav-link:hover{
            color:#1DB954 !important;
        }

        .navbar-toggler{
            border-color:#1DB954;
        }

        .navbar-toggler-icon{
            filter:invert(1);
        }

        .hero{
            text-align:center;
            padding:80px 20px;
        }

        .hero h1{
            color:#1DB954;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand" href="#">
            <i class="bi bi-spotify"></i> Spotify
        </a>

        <!-- Hamburger Button -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarMenu"
                aria-controls="navbarMenu"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Navigation Links -->
        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        <i class="bi bi-house-fill"></i> Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-music-note-list"></i> Playlists
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-person-circle"></i> Profile
                    </a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Sample Content -->
<div class="hero">
    <h1>🎵 Welcome to Spotify Playlist</h1>
    <p>Create, manage, and enjoy your favorite playlists anywhere.</p>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
