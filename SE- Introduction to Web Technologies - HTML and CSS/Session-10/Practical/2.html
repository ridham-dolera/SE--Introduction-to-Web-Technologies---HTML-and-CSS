<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Card</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f1f3f6;
        }

        .product-card{
            max-width:350px;
            margin:50px auto;
            transition:0.3s;
            border:none;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
        }

        .product-card:hover{
            transform:translateY(-6px);
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }

        .product-card img{
            height:250px;
            object-fit:cover;
        }

        .price{
            color:#388e3c;
            font-size:1.4rem;
            font-weight:bold;
        }

        .btn-buy{
            background:#2874f0;
            color:white;
        }

        .btn-buy:hover{
            background:#0d6efd;
            color:white;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card product-card">

        <img src="https://via.placeholder.com/350x250?text=Wireless+Headphones"
             class="card-img-top"
             alt="Wireless Headphones">

        <div class="card-body text-center">

            <h4 class="card-title">
                Wireless Bluetooth Headphones
            </h4>

            <p class="price">
                ₹2,499
            </p>

            <p class="card-text">
                Enjoy premium sound quality, Bluetooth 5.3 connectivity,
                and up to 30 hours of battery life.
            </p>

            <a href="#" class="btn btn-buy w-100">
                Buy Now
            </a>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
