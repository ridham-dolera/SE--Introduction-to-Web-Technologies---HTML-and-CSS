<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Filter Buttons</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f8f8;
        }

        .filter-section{
            margin-top:60px;
        }

        h2{
            color:#e23744;
            font-weight:bold;
        }

        .btn-filter{
            border-radius:25px;
            padding:10px 22px;
            font-weight:500;
        }
    </style>
</head>
<body>

<div class="container filter-section">

    <h2 class="text-center mb-4">
        🍽️ Filter Restaurants
    </h2>

    <div class="d-flex justify-content-center flex-wrap gap-3">

        <!-- Active Filter -->
        <button type="button"
                class="btn btn-danger btn-filter active"
                aria-pressed="true">
            All
        </button>

        <button type="button"
                class="btn btn-outline-success btn-filter">
            🥗 Veg
        </button>

        <button type="button"
                class="btn btn-outline-danger btn-filter">
            🍗 Non-Veg
        </button>

        <button type="button"
                class="btn btn-outline-warning btn-filter">
            🍰 Desserts
        </button>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
