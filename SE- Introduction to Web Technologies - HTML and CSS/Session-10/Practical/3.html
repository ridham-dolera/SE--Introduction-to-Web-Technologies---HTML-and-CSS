<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow Featured Movies</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        h2{
            color:#d32f2f;
            font-weight:bold;
        }

        .carousel{
            max-width:900px;
            margin:auto;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 6px 20px rgba(0,0,0,0.2);
        }

        .carousel-item img{
            height:500px;
            object-fit:cover;
        }

        .carousel-caption{
            background:rgba(0,0,0,0.6);
            border-radius:10px;
            padding:15px;
        }

        .carousel-caption h5{
            font-size:28px;
            font-weight:bold;
        }

        .carousel-caption p{
            font-size:16px;
        }

        @media(max-width:768px){
            .carousel-item img{
                height:300px;
            }

            .carousel-caption h5{
                font-size:20px;
            }

            .carousel-caption p{
                font-size:14px;
            }
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-4">
        🎬 Featured Movies
    </h2>

    <div id="movieCarousel" class="carousel slide" data-bs-ride="carousel">

        <!-- Indicators -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#movieCarousel" data-bs-slide-to="2"></button>
        </div>

        <!-- Carousel Items -->
        <div class="carousel-inner">

            <!-- Movie 1 -->
            <div class="carousel-item active">
                <img src="https://via.placeholder.com/900x500?text=Avengers+Endgame"
                     class="d-block w-100"
                     alt="Avengers Endgame">

                <div class="carousel-caption">
                    <h5>Avengers: Endgame</h5>
                    <p>Action • Adventure • Sci-Fi</p>
                </div>
            </div>

            <!-- Movie 2 -->
            <div class="carousel-item">
                <img src="https://via.placeholder.com/900x500?text=Interstellar"
                     class="d-block w-100"
                     alt="Interstellar">

                <div class="carousel-caption">
                    <h5>Interstellar</h5>
                    <p>Adventure • Drama • Sci-Fi</p>
                </div>
            </div>

            <!-- Movie 3 -->
            <div class="carousel-item">
                <img src="https://via.placeholder.com/900x500?text=Spider-Man+No+Way+Home"
                     class="d-block w-100"
                     alt="Spider-Man">

                <div class="carousel-caption">
                    <h5>Spider-Man: No Way Home</h5>
                    <p>Action • Fantasy • Adventure</p>
                </div>
            </div>

        </div>

        <!-- Previous Button -->
        <button class="carousel-control-prev"
                type="button"
                data-bs-target="#movieCarousel"
                data-bs-slide="prev">

            <span class="carousel-control-prev-icon"></span>

        </button>

        <!-- Next Button -->
        <button class="carousel-control-next"
                type="button"
                data-bs-target="#movieCarousel"
                data-bs-slide="next">

            <span class="carousel-control-next-icon"></span>

        </button>

    </div>

</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
