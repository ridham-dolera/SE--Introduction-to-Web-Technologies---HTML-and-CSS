<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Restaurant Review Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f8f8;
        }

        .review-card{
            max-width:600px;
            margin:50px auto;
            border:none;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.15);
        }

        .card-header{
            background:#e23744;
            color:#fff;
            text-align:center;
            font-size:1.5rem;
            font-weight:bold;
            border-radius:15px 15px 0 0 !important;
        }

        .btn-submit{
            background:#e23744;
            color:#fff;
        }

        .btn-submit:hover{
            background:#c62839;
            color:#fff;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card review-card">

        <div class="card-header">
            🍽️ Restaurant Review
        </div>

        <div class="card-body">

            <form>

                <!-- Name -->
                <div class="mb-3">
                    <label for="name" class="form-label">
                        Your Name
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="name"
                        placeholder="Enter your name"
                        required>
                </div>

                <!-- Rating -->
                <div class="mb-3">
                    <label for="rating" class="form-label">
                        Rating
                    </label>

                    <select
                        class="form-select"
                        id="rating"
                        required>

                        <option value="">Select Rating</option>
                        <option>⭐ 1 Star</option>
                        <option>⭐⭐ 2 Stars</option>
                        <option>⭐⭐⭐ 3 Stars</option>
                        <option>⭐⭐⭐⭐ 4 Stars</option>
                        <option>⭐⭐⭐⭐⭐ 5 Stars</option>

                    </select>
                </div>

                <!-- Review -->
                <div class="mb-3">
                    <label for="review" class="form-label">
                        Review Message
                    </label>

                    <textarea
                        class="form-control"
                        id="review"
                        rows="5"
                        placeholder="Write your review..."
                        required></textarea>
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <button
                        type="submit"
                        class="btn btn-submit btn-lg">
                        Submit Review
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
