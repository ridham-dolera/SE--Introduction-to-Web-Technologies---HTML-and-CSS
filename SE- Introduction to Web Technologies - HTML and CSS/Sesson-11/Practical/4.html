<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow - Book Ticket</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS (Loaded AFTER Bootstrap) -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="card mx-auto shadow" style="max-width:400px;">

        <img src="https://via.placeholder.com/400x250?text=Movie+Poster"
             class="card-img-top"
             alt="Movie Poster">

        <div class="card-body text-center">

            <h3 class="card-title">Avengers: Endgame</h3>

            <p class="text-muted">
                Action • Adventure • Sci-Fi
            </p>

            <!-- Uses the overridden Bootstrap primary button -->
            <button class="btn btn-primary">
                🎟️ Book Ticket
            </button>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
