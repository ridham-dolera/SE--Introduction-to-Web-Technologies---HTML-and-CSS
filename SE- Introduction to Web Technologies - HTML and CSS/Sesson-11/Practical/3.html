<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Restaurant List</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f8f8;
        }

        .restaurant-card{
            transition:0.3s;
            border:none;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.12);
        }

        .restaurant-card:hover{
            transform:translateY(-5px);
            box-shadow:0 10px 20px rgba(0,0,0,0.18);
        }

        .restaurant-img{
            height:220px;
            object-fit:cover;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="text-center text-danger mb-4">
        🍽️ Zomato Restaurant List
    </h2>

    <div class="row g-4">

        <!-- Restaurant 1 -->
        <div class="col-md-6">

            <div class="card restaurant-card">

                <img src="https://via.placeholder.com/600x220?text=Spice+Garden"
                     class="card-img-top restaurant-img"
                     alt="Spice Garden">

                <div class="card-body">

                    <h4 class="card-title">Spice Garden</h4>

                    <p class="text-muted">
                        North Indian • Chinese • Fast Food
                    </p>

                    <!-- Rating -->
                    <span class="badge bg-success">
                        ⭐ 4.5
                    </span>

                    <!-- Offer -->
                    <span class="badge bg-warning text-dark ms-2">
                        20% OFF
                    </span>

                    <!-- Status -->
                    <span class="badge bg-primary ms-2">
                        Open
                    </span>

                </div>

            </div>

        </div>

        <!-- Restaurant 2 -->
        <div class="col-md-6">

            <div class="card restaurant-card">

                <img src="https://via.placeholder.com/600x220?text=Pizza+Palace"
                     class="card-img-top restaurant-img"
                     alt="Pizza Palace">

                <div class="card-body">

                    <h4 class="card-title">Pizza Palace</h4>

                    <p class="text-muted">
                        Pizza • Italian • Beverages
                    </p>

                    <!-- Rating -->
                    <span class="badge bg-success">
                        ⭐ 4.7
                    </span>

                    <!-- Offer -->
                    <span class="badge bg-info text-dark ms-2">
                        Free Delivery
                    </span>

                    <!-- Status -->
                    <span class="badge bg-danger ms-2">
                        Closed
                    </span>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
