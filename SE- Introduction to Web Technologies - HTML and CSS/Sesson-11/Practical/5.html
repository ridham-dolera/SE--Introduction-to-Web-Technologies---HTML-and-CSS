<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Theme Switcher</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Main Container -->
<div id="mainContainer" class="container-fluid bg-light text-dark min-vh-100 py-5">

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>🎬 BookMyShow Movie Page</h2>

            <button id="themeBtn" class="btn btn-primary">
                🌙 Dark Mode
            </button>

        </div>

        <!-- Movie Card -->
        <div id="movieCard" class="card shadow">

            <img src="https://via.placeholder.com/800x350?text=Movie+Poster"
                 class="card-img-top"
                 alt="Movie Poster">

            <div class="card-body">

                <h3 class="card-title">Avengers: Endgame</h3>

                <p class="card-text">
                    Genre: Action • Adventure • Sci-Fi
                </p>

                <p class="card-text">
                    Rating: ⭐ 4.8 / 5
                </p>

                <button class="btn btn-danger">
                    🎟️ Book Ticket
                </button>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const container = document.getElementById("mainContainer");
const movieCard = document.getElementById("movieCard");
const button = document.getElementById("themeBtn");

button.addEventListener("click", function(){

    // Toggle Bootstrap background and text classes
    container.classList.toggle("bg-light");
    container.classList.toggle("text-dark");

    container.classList.toggle("bg-dark");
    container.classList.toggle("text-light");

    // Change card theme
    movieCard.classList.toggle("bg-dark");
    movieCard.classList.toggle("text-light");

    // Update button text
    if(container.classList.contains("bg-dark")){
        button.innerHTML = "☀️ Light Mode";
    }else{
        button.innerHTML = "🌙 Dark Mode";
    }

});

</script>

</body>
</html>
