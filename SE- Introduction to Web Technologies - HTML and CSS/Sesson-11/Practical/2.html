<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow Movie Review Card</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .movie-card{
            max-width:500px;
            margin:50px auto;
            border:none;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
            overflow:hidden;
        }

        .movie-card img{
            height:350px;
            object-fit:cover;
        }

        .rating-badge{
            display:inline-block;
            background:#28a745;
            color:#fff;
            padding:6px 12px;
            border-radius:6px;
        }

        .btn-book{
            background:#f84464;
            color:#fff;
        }

        .btn-book:hover{
            background:#d62d4d;
            color:#fff;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card movie-card">

        <img src="https://via.placeholder.com/500x350?text=Movie+Poster"
             class="card-img-top"
             alt="Movie Poster">

        <div class="card-body">

            <!-- Movie Title -->
            <h2 class="fw-bold display-6">
                Avengers: Endgame
            </h2>

            <!-- Rating -->
            <p class="fs-5 fw-semibold">
                ⭐ Rating:
                <span class="rating-badge">4.8 / 5</span>
            </p>

            <!-- Review -->
            <p class="fs-6 fw-light text-secondary">
                Avengers: Endgame is an action-packed superhero film with
                stunning visual effects, emotional storytelling, and an
                unforgettable finale. It delivers an exciting cinematic
                experience for Marvel fans.
            </p>

            <button class="btn btn-book w-100 mt-3">
                🎟️ Book Now
            </button>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
