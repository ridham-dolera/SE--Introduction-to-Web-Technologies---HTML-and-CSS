<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Product Card - Bootstrap Spacing</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f1f3f6;
        }

        .product-card{
            max-width:350px;
            margin:auto;
            transition:0.3s;
        }

        .product-card:hover{
            transform:translateY(-5px);
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        .product-card img{
            height:220px;
            object-fit:cover;
        }

        .product-name{
            color:#212121;
            font-weight:bold;
            font-size:1.2rem;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center text-primary mb-4">
        🛒 Flipkart Product Card
    </h2>

    <!-- 
        Bootstrap Spacing Utilities Used:
        mt-5  = Large top margin
        p-4   = Medium padding
        mb-3  = Bottom margin
        p-2   = Small padding
    -->

    <div class="card product-card mt-5 p-4">

        <img src="https://via.placeholder.com/350x220?text=Wireless+Headphones"
             class="card-img-top mb-3"
             alt="Wireless Headphones">

        <div class="card-body p-2 text-center">

            <h5 class="product-name">
                Wireless Bluetooth Headphones
            </h5>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
