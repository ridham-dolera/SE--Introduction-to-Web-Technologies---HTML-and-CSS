<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipkart Product Tile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f1f3f6;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.product-card{
    width:280px;
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.product-card img{
    width:100%;
    border-radius:8px;
}

/* Display: block */
.product-name{
    display:block;
    font-size:20px;
    font-weight:bold;
    margin:15px 0 10px;
    color:#212121;
}

/* Display: inline-block */
.price{
    display:inline-block;
    background:#388e3c;
    color:#fff;
    padding:8px 14px;
    border-radius:5px;
    font-size:18px;
}

/* Display: none */
.hide-price .price{
    display:none;
}

button{
    display:block;
    width:100%;
    margin-top:20px;
    padding:10px;
    border:none;
    background:#2874f0;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0f5cd8;
}
</style>

</head>
<body>

<!-- Remove or add the class "hide-price" to test the effect -->

<div class="product-card hide-price">

    <img src="https://via.placeholder.com/250x250.png?text=Headphones"
         alt="Wireless Headphones">

    <span class="product-name">
        Wireless Bluetooth Headphones
    </span>

    <span class="price">
        ₹2,499
    </span>

    <button>Add to Cart</button>

</div>

</body>
</html>
