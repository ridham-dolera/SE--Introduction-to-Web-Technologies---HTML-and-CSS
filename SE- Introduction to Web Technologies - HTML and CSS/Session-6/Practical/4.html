<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BookMyShow Movie Poster Grid</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#d32f2f;
}

/* Grid Layout */
.poster-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px;
    max-width:900px;
    margin:auto;
}

/* Each Poster Card */
.poster{
    position:relative;      /* Parent for absolute badge */
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    transition:0.3s;
}

.poster:hover{
    transform:translateY(-5px);
}

.poster img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.poster h3{
    padding:15px;
    text-align:center;
    color:#333;
}

/* New Badge */
.badge{
    position:absolute;
    top:10px;
    left:10px;
    background:#ff1744;
    color:#fff;
    padding:6px 12px;
    border-radius:20px;
    font-size:14px;
    font-weight:bold;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
}
</style>
</head>
<body>

<h1>🎬 BookMyShow Movie Posters</h1>

<div class="poster-grid">

    <!-- Poster with NEW badge -->
    <div class="poster">
        <span class="badge">NEW</span>

        <img src="https://via.placeholder.com/250x350.png?text=Movie+1"
             alt="Movie Poster 1">

        <h3>Avengers: Endgame</h3>
    </div>

    <!-- Poster -->
    <div class="poster">
        <img src="https://via.placeholder.com/250x350.png?text=Movie+2"
             alt="Movie Poster 2">

        <h3>Spider-Man: No Way Home</h3>
    </div>

    <!-- Poster -->
    <div class="poster">
        <img src="https://via.placeholder.com/250x350.png?text=Movie+3"
             alt="Movie Poster 3">

        <h3>Interstellar</h3>
    </div>

    <!-- Poster -->
    <div class="poster">
        <img src="https://via.placeholder.com/250x350.png?text=Movie+4"
             alt="Movie Poster 4">

        <h3>Inception</h3>
    </div>

</div>

</body>
</html>
